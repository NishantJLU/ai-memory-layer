name: AI Memory Ingestion

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [closed]
    branches: [ "main" ]

jobs:
  ingest:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Memory Layer Ingestion
        run: |
          curl -X POST "${{ secrets.MEMORY_LAYER_URL }}/ingest" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.MEMORY_LAYER_API_KEY }}" \
            -d '{
              "repo_path": "/app/repos/${{ github.event.repository.name }}",
              "project_id": "${{ github.event.repository.name }}",
              "max_commits": 10
            }'
